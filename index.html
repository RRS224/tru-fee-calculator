<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRU Tuition Calculator</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

.searchbox{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
}

.summary{
background:#eef4ff;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.yearblock{
border-top:1px solid #eee;
padding-top:20px;
margin-top:20px;
}

.semester{
display:flex;
justify-content:space-between;
padding:6px 0;
}

.totalyear{
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>TRU Tuition Calculator (PGWP-Eligible Programs)</h1>

<input class="searchbox" id="search" placeholder="Type program name (MBA, BBA, Nursing, Data Science...)">

<div id="programinfo"></div>

</div>

<script>

let programs=[]
const courseFee=2623

fetch("tru_pgwp_programs_master.json")
.then(r=>r.json())
.then(data=>{
programs=data
})

document.getElementById("search").addEventListener("input",function(){

let text=this.value.toLowerCase()

let matches=programs.filter(p=>{

let name=p.program_name.toLowerCase()

return name.includes(text)
||
(text==="mba" && name.includes("business administration"))
||
(text==="bba" && name.includes("business administration"))
||
(text==="bsc" && name.includes("science"))
})

if(matches.length>0){
showProgram(matches[0])
}

})

function showProgram(p){

let years=4
let totalCourses=p.total_courses || 40

if(p.category==="Graduate"){
renderGraduate(p)
return
}

let html=`<div class="summary">
<h2>${p.program_name}</h2>
Program length: ${years} years
</div>`

let coursesRemaining=totalCourses

for(let y=1;y<=years;y++){

let fall=4
let winter=4
let may=2

let fallCost=fall*courseFee
let winterCost=winter*courseFee
let mayCost=may*courseFee

let yearTotal=fallCost+winterCost+mayCost

html+=`
<div class="yearblock">

<h3>Year ${y}</h3>

<div class="semester">
<span>Fall (${fall} courses)</span>
<span>$${fallCost.toLocaleString()}</span>
</div>

<div class="semester">
<span>Winter (${winter} courses)</span>
<span>$${winterCost.toLocaleString()}</span>
</div>

<div class="semester">
<span>May (${may} courses)</span>
<span>$${mayCost.toLocaleString()}</span>
</div>

<div class="totalyear">
Total Year ${y}: $${yearTotal.toLocaleString()}
</div>

</div>
`

}

let total=totalCourses*courseFee

html+=`
<div class="summary">
<h2>Total Program Tuition</h2>
$${total.toLocaleString()} CAD
</div>
`

document.getElementById("programinfo").innerHTML=html

}

function renderGraduate(p){

let html=`<div class="summary">

<h2>${p.program_name}</h2>

Program length: 2 years

Year 1 tuition: $27,784 CAD  
Year 2 tuition: $27,784 CAD

<h3>Total tuition: $55,568 CAD</h3>

</div>`

document.getElementById("programinfo").innerHTML=html

}

</script>

</body>
</html>
